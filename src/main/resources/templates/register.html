<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Midaxus</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <img src="/img/midaxus_icon.png" alt="Logo Midaxus" class="logo">
                <img src="/img/midaxus-font.png" alt="Logo Midaxus" class="font" height="50px" width="200px">
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <input type="text" id="name" name="name" placeholder="Nombre completo" required>
                </div>

                <div class="form-group">
                    <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
                </div>

                <div class="form-group">
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>
                </div>

                <div class="form-group">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña" required>
                </div>

                <button type="submit" class="btn-login">Crear cuenta</button>
            </form>

            <div class="login-footer">
                <a href="/login">¿Ya tienes una cuenta? Inicia sesión</a>
            </div>
        </div>
    </div>

    <script src="/js/register.js"></script>
</body>
</html>
