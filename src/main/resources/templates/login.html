<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Midaxus</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
        <!-- Dynamic Header Banner -->
        <div id="login-header-banner" class="p-8 text-center text-white bg-blue-600 transition-colors duration-300">
            <div class="flex justify-center mb-3">
                <img src="/img/midaxus_icon.png" alt="Logo Midaxus" class="h-16 w-auto bg-white/20 p-2 rounded-xl backdrop-blur-sm shadow-sm" />
            </div>
            <h1 class="text-3xl font-bold mb-1 tracking-tight">midaxus</h1>
            <h2 id="login-role-title" class="text-xl font-semibold">Estudiantes</h2>
            <p id="login-role-subtitle" class="text-sm text-white/80">Acceso para estudiantes</p>
        </div>

        <div class="p-8">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Usuario / Correo</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-user text-gray-400"></i>
                        </div>
                        <input type="email" id="email" name="email" required placeholder="Ingresa tu correo" 
                               class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" />
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña" 
                               class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow" />
                    </div>
                </div>

                <button type="submit" id="login-submit-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg flex justify-center items-center gap-2 transition-colors">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="/forgotpassword" class="text-sm text-gray-600 hover:text-gray-900 hover:underline">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

    <!-- Script de UI -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            
            const headerBanner = document.getElementById('login-header-banner');
            const roleTitle = document.getElementById('login-role-title');
            const roleSubtitle = document.getElementById('login-role-subtitle');
            const submitBtn = document.getElementById('login-submit-btn');
            
            if (role === 'teacher') {
                headerBanner.className = "p-8 text-center text-white bg-indigo-600 transition-colors duration-300";
                submitBtn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg flex justify-center items-center gap-2 transition-colors";
                roleTitle.textContent = "Profesores";
                roleSubtitle.textContent = "Acceso para profesores";
            } else if (role === 'admin') {
                headerBanner.className = "p-8 text-center text-white bg-red-600 transition-colors duration-300";
                submitBtn.className = "w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-lg flex justify-center items-center gap-2 transition-colors";
                roleTitle.textContent = "Administrador";
                roleSubtitle.textContent = "Panel de administración";
            }
        });
    </script>
    <script src="/js/login.js"></script>
</body>
</html>
