<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Midaxus</title>

    <!-- Usa los mismos estilos -->
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/forgot-password.css">
</head>

<body>

<a href="/" class="logo-text">
    <img src="/img/midaxus_icon.png" alt="Logo Midaxus" class="logo">
    <img src="/img/midaxus-font.png" alt="Midaxus" class="font" height="50px" width="200px">
</a>

<!-- Paso único: Restablecer contraseña -->
<div id="step-reset" class="step active">
    <div class="step-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1v22M4 7l8-6 8 6M4 17l8 6 8-6"/>
        </svg>
    </div>

    <h2>Restablecer contraseña</h2>
    <p class="step-desc">Crea una nueva contraseña segura.</p>

    <form id="resetForm">
        <div class="form-group">
            <input type="password" id="password" placeholder="Nueva contraseña" required>
        </div>

        <div class="form-group">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña" required>
        </div>

        <button type="submit" class="btn-action">Restablecer Contraseña</button>
    </form>
</div>

<div class="forgot-footer">
    <a href="/login">← Volver a Iniciar Sesión</a>
</div>


<script>

    //----------------------------
    // Simple sistema de alertas
    //----------------------------
    function notify(message, type="info") {
        alert(message);
    }

    //----------------------------
    // Obtener token desde la URL
    //----------------------------
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
        notify("Token inválido o inexistente.", "error");
        setTimeout(() => window.location.href = "/login", 1500);
    }

    //----------------------------
    // Validar token con backend
    //----------------------------
    async function validarToken() {
        try {
            const resp = await fetch(`/auth/validate-reset-token?token=${token}`);
            const data = await resp.json();

            if (!data.success) {
                notify("El enlace expiró o no es válido.", "error");
                setTimeout(() => window.location.href = "/login", 2000);
            }

        } catch (err) {
            console.error(err);
            notify("Error al validar el enlace.", "error");
        }
    }

    validarToken();

    //----------------------------
    // Enviar nueva contraseña
    //----------------------------
    const resetForm = document.getElementById("resetForm");

    resetForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const pass = document.getElementById("password").value.trim();
        const confirm = document.getElementById("confirmPassword").value.trim();

        if (pass.length < 5) {
            notify("La contraseña debe tener mínimo 5 caracteres.", "error");
            return;
        }

        if (pass !== confirm) {
            notify("Las contraseñas no coinciden.", "error");
            return;
        }

        try {
            const resp = await fetch("/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token: token,
                    password: pass
                })
            });

            const data = await resp.json();

            if (!data.success) {
                notify(data.message, "error");
                return;
            }

            notify("Contraseña actualizada correctamente.", "success");

            setTimeout(() => {
                window.location.href = "/login";
            }, 1200);

        } catch (err) {
            console.error(err);
            notify("Error en el servidor.", "error");
        }

    });

</script>

</body>
</html>
