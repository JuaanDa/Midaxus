<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Midaxus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/forgot-password.css">
</head>

<body>

<a href="landing.html" class="logo-text">

</a>

<!-- Step 1: Ingresar correo -->
<div id="step-email" class="step active">
    <div class="step-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
    </div>
    <h2>¿Olvidaste tu contraseña?</h2>
    <p class="step-desc">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>

    <form id="emailForm">
        <div class="form-group">
            <input type="email"
                   id="email"
                   name="email"
                   placeholder="Correo electrónico"
                   required
                   autocomplete="email">
        </div>

        <button type="submit" class="btn-action">Enviar enlace</button>
    </form>
</div>

<!-- Step 2: Confirmación enviada -->
<div id="step-sent" class="step">
    <div class="step-icon success">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2
                     19.79 19.79 0 0 1-8.63-3.07A19.5 19.5
                     0 0 1 4.69 12 19.79 19.79 0 0 1 1.63
                     3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2
                     1.72c.127.96.361 1.903.7 2.81a2 2 0 0
                     1-.45 2.11L7.91 8.85a16 16 0 0 0 6
                     6l.95-.95a2 2 0 0 1 2.11-.45c.907.339
                     1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path>
            <polyline points="16 2 20 6 12 14"></polyline>
        </svg>
    </div>

    <h2>Revisa tu correo</h2>
    <p class="step-desc">
        Enviamos un enlace de recuperación a
        <strong id="sentEmail"></strong>. Puede tardar unos minutos.
    </p>

    <p class="step-hint">
        ¿No llegó? Revisa tu carpeta de spam o
        <button type="button" class="btn-link" id="resendBtn">reenvía el correo</button>.
    </p>
</div>

<div class="forgot-footer">
    <a href="login.html">← Volver a Iniciar Sesión</a>
</div>

<script>
    const emailForm = document.getElementById('emailForm');
    const stepEmail = document.getElementById('step-email');
    const stepSent = document.getElementById('step-sent');
    const sentEmail = document.getElementById('sentEmail');
    const resendBtn = document.getElementById('resendBtn');

    // Notificaciones simples
    function notify(msg, type = "info") {
        alert(msg); // puedes reemplazarlo luego con tu sistema de notificaciones
    }

    emailForm.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();

        if (!email) {
            notify("Ingresa un correo válido", "error");
            return;
        }

        try {
            const response = await fetch("/auth/forgot-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email })
            });

            const data = await response.json();

            if (!data.success) {
                notify(data.message, "error");
                return;
            }

            // Mover a la vista de confirmación
            sentEmail.textContent = email;
            stepEmail.classList.remove("active");
            stepSent.classList.add("active");

        } catch (err) {
            console.error(err);
            notify("Error en el servidor", "error");
        }
    });

    resendBtn.addEventListener("click", () => {
        stepSent.classList.remove('active');
        stepEmail.classList.add('active');
    });
</script>

</body>
</html>
