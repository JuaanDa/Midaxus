<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Midaxus</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <a href="landing.html" class="logo-text">

                <img src="assets/images/midaxus_icon.png" alt="Logo Midaxus" class="logo">
                <img src="assets/images/midaxus-font.png" alt="Logo Midaxus" class="font" height="50px" width="200px">
        </div>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
            </div>

            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
            </div>

            <div class="form-group checkbox">
                <label for="remember">
                    <input type="checkbox" id="remember" name="remember">
                    <span>Mantener sesión iniciada</span>
                </label>
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div class="login-footer">
            <a href="forgotpassword.html">¿Olvidaste tu contraseña?</a>
            <span class="separator">•</span>
            <a href="register.html">Crear cuenta</a>
        </div>
    </div>
</div>

<script src="js/login.js"></script>
</body>
</html>
